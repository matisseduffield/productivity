name: Build & Release APK

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Restore signing keystore from secrets
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          printf '%s' "$KEYSTORE_BASE64" | tr -d '\r\n' | base64 -d > "$RUNNER_TEMP/bento-release.keystore"
          echo "KEYSTORE_PATH=$RUNNER_TEMP/bento-release.keystore" >> "$GITHUB_ENV"
          # Fail early if the keystore didn't materialize. keytool reports
          # errors on stdout, so capture everything and print on failure.
          if ! keytool -list -keystore "$RUNNER_TEMP/bento-release.keystore" \
              -storepass "${{ secrets.KEYSTORE_PASSWORD }}" > "$RUNNER_TEMP/keytool.log" 2>&1; then
            echo "Keystore verification failed:"
            cat "$RUNNER_TEMP/keytool.log"
            exit 1
          fi

      - name: Derive version from tag
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            VN="${GITHUB_REF_NAME#v}"
            echo "VERSION_NAME=$VN" >> "$GITHUB_ENV"
            # Monotonic versionCode from the dotted version: major*10000 + minor*100 + patch.
            IFS='.' read -r MA MI PA <<< "$VN"
            echo "VERSION_CODE=$(( ${MA:-0} * 10000 + ${MI:-0} * 100 + ${PA:-0} ))" >> "$GITHUB_ENV"
          fi

      - name: Run unit tests
        run: ./gradlew :app:testReleaseUnitTest

      - name: Build signed release APK
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew :app:assembleRelease

      - name: Name the APK
        run: |
          VERSION="${GITHUB_REF_NAME}"
          if [[ "$GITHUB_REF" != refs/tags/* ]]; then VERSION="manual-${GITHUB_SHA::7}"; fi
          cp app/build/outputs/apk/release/app-release.apk "BentoCalendar-${VERSION}.apk"
          echo "APK_NAME=BentoCalendar-${VERSION}.apk" >> "$GITHUB_ENV"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: apk
          path: ${{ env.APK_NAME }}

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.APK_NAME }}
          generate_release_notes: true
